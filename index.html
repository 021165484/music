<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Taurus Music Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
"Segoe UI",
sans-serif;
}

html,
body{

width:100%;
height:100%;

overflow:hidden;

background:#000;
color:white;
}

/* ======================
   🌊 液體背景
====================== */

.liquid-bg{

position:fixed;

inset:0;

overflow:hidden;

z-index:-10;

background:#000;
}

.blob{

position:absolute;

width:40vw;
height:40vw;

border-radius:50%;

filter:blur(120px);

mix-blend-mode:screen;

animation:
float 18s
infinite
ease-in-out
alternate;
}

.blob:nth-child(1){

background:#1db954;

top:10%;
left:10%;
}

.blob:nth-child(2){

background:#00ffcc;

top:50%;
left:60%;

animation-delay:-5s;
}

.blob:nth-child(3){

background:#00aa66;

top:20%;
left:70%;

animation-delay:-10s;
}

.blob:nth-child(4){

background:#33ff99;

top:60%;
left:20%;

animation-delay:-15s;
}

@keyframes float{

0%{
transform:
translate(0,0)
scale(1);
}

25%{
transform:
translate(100px,-80px)
scale(1.2);
}

50%{
transform:
translate(-120px,100px)
scale(.9);
}

75%{
transform:
translate(80px,60px)
scale(1.3);
}

100%{
transform:
translate(-100px,-100px)
scale(1.1);
}

}

/* ======================
   主畫面
====================== */

.container{

width:100%;
height:100vh;

display:flex;

justify-content:center;
align-items:center;
}

/* ======================
   環繞音波
====================== */

.player-wrap{

position:relative;

width:430px;
height:720px;
}

#spectrum{

position:absolute;

inset:0;

width:100%;
height:100%;

z-index:1;

filter:
drop-shadow(0 0 10px #1db954)
drop-shadow(0 0 25px #1db954)
drop-shadow(0 0 45px #1db954);
}

/* ======================
   Spotify卡片
====================== */

.player{

position:absolute;

top:40px;
left:40px;
right:40px;
bottom:40px;

z-index:2;

border-radius:35px;

background:
rgba(18,18,18,.72);

backdrop-filter:
blur(25px);

border:
1px solid rgba(255,255,255,.08);

display:flex;
flex-direction:column;

align-items:center;

padding:25px;

animation:
breathe 4s
ease-in-out
infinite;
}

@keyframes breathe{

0%{
box-shadow:
0 0 15px rgba(29,185,84,.2);
}

50%{
box-shadow:
0 0 70px rgba(29,185,84,.8);
}

100%{
box-shadow:
0 0 15px rgba(29,185,84,.2);
}

}

/* ======================
   封面
====================== */

.cover-wrap{

position:relative;

width:250px;
height:250px;

margin-top:10px;
}

.cover-wrap::before{

content:"";

position:absolute;

inset:-20px;

background:url("cover.png");

background-size:cover;
background-position:center;

border-radius:50%;

filter:blur(40px);

opacity:.5;

animation:
glowPulse 4s
ease-in-out
infinite;
}

@keyframes glowPulse{

0%{
opacity:.3;
transform:scale(1);
}

50%{
opacity:.8;
transform:scale(1.08);
}

100%{
opacity:.3;
transform:scale(1);
}

}

.cover{

position:relative;

z-index:2;

width:250px;
height:250px;

object-fit:cover;

border-radius:50%;
}

.song{

margin-top:25px;

font-size:32px;
font-weight:bold;
}

.artist{

color:#aaa;

margin-top:8px;
font-size:16px;
}
  /* ======================
   波形
====================== */

#wave{

width:100%;
height:90px;

margin-top:20px;
}

/* ======================
   進度條
====================== */

.progress-area{

width:100%;

margin-top:15px;
}

#progress{

width:100%;

accent-color:#1db954;

cursor:pointer;
}

.time{

display:flex;

justify-content:space-between;

font-size:13px;

color:#aaa;

margin-bottom:6px;
}

/* ======================
   Spotify控制列
====================== */

.bottom{

margin-top:auto;

width:100%;
}

.controls{

display:flex;

justify-content:center;
align-items:center;

gap:25px;
}

.btn{

border:none;

cursor:pointer;

background:#1db954;

color:#000;

font-weight:bold;
}

.main-btn{

width:70px;
height:70px;

border-radius:50%;

font-size:26px;
}

.small-btn{

width:55px;
height:55px;

border-radius:50%;

font-size:20px;
}

.volume{

width:100%;

margin-top:20px;

accent-color:#1db954;
}

</style>

</head>

<body>

<!-- 液體背景 -->

<div class="liquid-bg">

<div class="blob"></div>
<div class="blob"></div>
<div class="blob"></div>
<div class="blob"></div>

</div>

<div class="container">

<div class="player-wrap">

<canvas id="spectrum"></canvas>

<div class="player">

<div class="cover-wrap">

<img
src="cover.png"
id="cover"
class="cover">

</div>

<div class="song">
Taurus Music
</div>

<div class="artist">
Spotify Style Player
</div>

<canvas id="wave"></canvas>

<div class="progress-area">

<div class="time">

<span id="currentTime">
0:00
</span>

<span id="duration">
0:00
</span>

</div>

<input
type="range"
id="progress"
value="0">

</div>

<div class="bottom">

<div class="controls">

<button
class="btn small-btn"
id="prevBtn">
⏮
</button>

<button
class="btn main-btn"
id="playBtn">
▶
</button>

<button
class="btn small-btn"
id="nextBtn">
⏭
</button>

</div>

<input
class="volume"
type="range"
id="volume"
min="0"
max="1"
step="0.01"
value="1">

</div>

</div>

</div>

</div>

<audio
id="audio"
src="music.mp3"
loop>
</audio>

<script>

const audio =
document.getElementById("audio");

const playBtn =
document.getElementById("playBtn");

const volume =
document.getElementById("volume");

const progress =
document.getElementById("progress");

const cover =
document.getElementById("cover");

const currentTime =
document.getElementById("currentTime");

const duration =
document.getElementById("duration");

/* ======================
   播放控制
====================== */

playBtn.onclick = () => {

    if(audio.paused){

        audio.play();

        playBtn.innerHTML = "❚❚";

    }else{

        audio.pause();

        playBtn.innerHTML = "▶";

    }

};

volume.oninput = () => {

    audio.volume = volume.value;

};

audio.ontimeupdate = () => {

    progress.value =
    (audio.currentTime / audio.duration) * 100 || 0;

    currentTime.textContent =
    formatTime(audio.currentTime);

    duration.textContent =
    formatTime(audio.duration || 0);

};

progress.oninput = () => {

    audio.currentTime =
    (progress.value / 100) * audio.duration;

};

function formatTime(sec){

    let m =
    Math.floor(sec / 60) || 0;

    let s =
    Math.floor(sec % 60) || 0;

    return m + ":" +
    String(s).padStart(2,"0");
}

/* ======================
   Audio Context
====================== */

const AudioContextClass =
window.AudioContext ||
window.webkitAudioContext;

const audioCtx =
new AudioContextClass();

const source =
audioCtx.createMediaElementSource(audio);

const analyser =
audioCtx.createAnalyser();

source.connect(analyser);
analyser.connect(audioCtx.destination);

analyser.fftSize = 256;

const dataArray =
new Uint8Array(
analyser.frequencyBinCount
);

document.body.addEventListener(
"click",
()=>{
if(audioCtx.state==="suspended"){
audioCtx.resume();
}
}
);

/* ======================
   波形
====================== */

const wave =
document.getElementById("wave");

const wctx =
wave.getContext("2d");

wave.width = 320;
wave.height = 90;

function drawWave(){

requestAnimationFrame(drawWave);

analyser.getByteTimeDomainData(
dataArray
);

wctx.clearRect(
0,
0,
wave.width,
wave.height
);

wctx.beginPath();

wctx.strokeStyle =
"#1db954";

wctx.lineWidth = 3;

let slice =
wave.width /
dataArray.length;

let x = 0;

for(
let i=0;
i<dataArray.length;
i++
){

let v =
dataArray[i] / 128;

let y =
v *
wave.height / 2;

if(i===0){

wctx.moveTo(x,y);

}else{

wctx.lineTo(x,y);

}

x += slice;

}

wctx.stroke();

}

drawWave();

/* ======================
   環繞音波
====================== */

const spectrum =
document.getElementById(
"spectrum"
);

const sctx =
spectrum.getContext("2d");

spectrum.width = 430;
spectrum.height = 720;

function drawSpectrum(){

requestAnimationFrame(
drawSpectrum
);

analyser.getByteFrequencyData(
dataArray
);

sctx.clearRect(
0,
0,
spectrum.width,
spectrum.height
);

const cx = 215;
const cy = 360;

const cardW = 310;
const cardH = 600;

for(
let i=0;
i<120;
i++
){

let value =
dataArray[
i %
dataArray.length
];

let length =
value * 0.35;

let x,y,dx,dy;

if(i<30){

x =
cx-cardW/2+
(i/30)*cardW;

y =
cy-cardH/2;

dx=0;
dy=-1;

}
else if(i<60){

x =
cx+cardW/2;

y =
cy-cardH/2+
((i-30)/30)*cardH;

dx=1;
dy=0;

}
else if(i<90){

x =
cx+cardW/2-
((i-60)/30)*cardW;

y =
cy+cardH/2;

dx=0;
dy=1;

}
else{

x =
cx-cardW/2;

y =
cy+cardH/2-
((i-90)/30)*cardH;

dx=-1;
dy=0;

}

sctx.beginPath();

sctx.strokeStyle =
"#1db954";

sctx.lineWidth = 6;

sctx.lineCap =
"round";

sctx.moveTo(x,y);

sctx.lineTo(
x + dx*length,
y + dy*length
);

sctx.stroke();

}

}

drawSpectrum();

/* ======================
   封面模糊光暈
====================== */

audio.onplay = ()=>{

document
.querySelector(".cover-wrap")
.style.filter =
"drop-shadow(0 0 40px #1db954)";

};

audio.onpause = ()=>{

document
.querySelector(".cover-wrap")
.style.filter =
"none";

};

/* ======================
   視窗縮放
====================== */

window.addEventListener(
"resize",
()=>{

location.reload();

}
);

</script>

</body>
</html>
