<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taurus Music Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
overflow:hidden;
color:white;
}

/* 星空背景 */
#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

.container{
position:relative;
z-index:2;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* 外框音波 */
.player-wrap{
position:relative;
width:420px;
height:700px;
}

#spectrum{
position:absolute;
inset:0;
width:100%;
height:100%;
z-index:1;

filter:
drop-shadow(0 0 8px #1db954)
drop-shadow(0 0 20px #1db954)
drop-shadow(0 0 40px #1db954);
}

/* 主卡片 */
.player{
position:absolute;
top:40px;
left:40px;
right:40px;
bottom:40px;

background:#111;
border-radius:35px;

display:flex;
flex-direction:column;
align-items:center;

padding:25px;

z-index:2;

animation:breathe 3s infinite ease-in-out;
}

@keyframes breathe{

0%{
box-shadow:0 0 20px rgba(29,185,84,.2);
}

50%{
box-shadow:0 0 70px rgba(29,185,84,.8);
}

100%{
box-shadow:0 0 20px rgba(29,185,84,.2);
}

}

/* 唱片 */
.cover-wrap{
position:relative;
margin-top:10px;
}

.cover{

width:240px;
height:240px;

border-radius:50%;
object-fit:cover;

box-shadow:
0 0 30px rgba(29,185,84,.4);

transition:.05s;
}

.spin{
animation:spin 10s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.song{
margin-top:20px;
font-size:34px;
font-weight:bold;
}

.artist{
font-size:20px;
color:#aaa;
margin-bottom:25px;
}

/* 波形 */
#wave{
width:100%;
height:80px;
}

/* 進度 */
.progress-wrap{
width:100%;
margin-top:10px;
}

#progress{
width:100%;
accent-color:#1db954;
}

/* 底部 */
.bottom{

margin-top:auto;
width:100%;

display:flex;
flex-direction:column;
gap:15px;
}

.controls{

display:flex;
justify-content:center;
align-items:center;
gap:30px;
}

.btn{

width:70px;
height:70px;

border:none;
border-radius:50%;

background:#1db954;
color:black;

font-size:28px;
font-weight:bold;
cursor:pointer;
}

.small{

width:55px;
height:55px;

font-size:22px;
}

.volume{
width:100%;
accent-color:#1db954;
}

.time{
display:flex;
justify-content:space-between;
font-size:14px;
color:#aaa;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<div class="player-wrap">

<canvas id="spectrum"></canvas>

<div class="player" id="player">

<div class="cover-wrap">
<img src="cover.png" class="cover" id="cover">
</div>

<div class="song">Taurus Music</div>
<div class="artist">Now Playing</div>

<canvas id="wave"></canvas>

<div class="progress-wrap">

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>

<input type="range" id="progress" value="0">

</div>

<div class="bottom">

<div class="controls">

<button class="btn small">⏮</button>

<button class="btn" id="playBtn">
▶
</button>

<button class="btn small">⏭</button>

</div>

<input
class="volume"
type="range"
id="volume"
min="0"
max="1"
step="0.01"
value="1">

</div>

</div>
</div>
</div>

<audio id="audio" src="music.mp3" loop></audio>

<script>

/* 播放器 */
const audio=document.getElementById("audio");
const playBtn=document.getElementById("playBtn");
const progress=document.getElementById("progress");
const volume=document.getElementById("volume");
const cover=document.getElementById("cover");

playBtn.onclick=()=>{

if(audio.paused){

audio.play();

playBtn.innerHTML="❚❚";

cover.classList.add("spin");

}else{

audio.pause();

playBtn.innerHTML="▶";

cover.classList.remove("spin");
}
};

volume.oninput=()=>{
audio.volume=volume.value;
};

audio.ontimeupdate=()=>{

progress.value=
(audio.currentTime/audio.duration)*100||0;

document.getElementById("current").textContent=
format(audio.currentTime);

document.getElementById("duration").textContent=
format(audio.duration||0);

};

progress.oninput=()=>{
audio.currentTime=
(progress.value/100)*audio.duration;
};

function format(sec){

let m=Math.floor(sec/60)||0;
let s=Math.floor(sec%60)||0;

return m+":"+
String(s).padStart(2,"0");
}

/* 音訊分析 */

const AudioContext=
window.AudioContext||
window.webkitAudioContext;

const ctx=new AudioContext();

const source=
ctx.createMediaElementSource(audio);

const analyser=
ctx.createAnalyser();

source.connect(analyser);
analyser.connect(ctx.destination);

analyser.fftSize=256;

const dataArray=
new Uint8Array(analyser.frequencyBinCount);

document.body.onclick=()=>{
ctx.resume();
};

/* 中間波形 */

const wave=document.getElementById("wave");
const wctx=wave.getContext("2d");

wave.width=320;
wave.height=80;

function drawWave(){

requestAnimationFrame(drawWave);

analyser.getByteTimeDomainData(dataArray);

wctx.clearRect(0,0,wave.width,wave.height);

wctx.beginPath();
wctx.strokeStyle="#1db954";
wctx.lineWidth=3;

let slice=
wave.width/dataArray.length;

let x=0;

for(let i=0;i<dataArray.length;i++){

let v=dataArray[i]/128;

let y=v*wave.height/2;

if(i===0){
wctx.moveTo(x,y);
}else{
wctx.lineTo(x,y);
}

x+=slice;
}

wctx.stroke();
}

drawWave();

/* 環繞音波 */

const spectrum=
document.getElementById("spectrum");

const sctx=
spectrum.getContext("2d");

spectrum.width=420;
spectrum.height=700;

function drawBorder(){

requestAnimationFrame(drawBorder);

analyser.getByteFrequencyData(dataArray);

sctx.clearRect(
0,0,
spectrum.width,
spectrum.height
);

let cx=210;
let cy=350;

let w=300;
let h=580;

for(let i=0;i<120;i++){

let v=
dataArray[i%
dataArray.length];

let size=v*0.35;

let x,y,dx,dy;

if(i<30){

x=cx-w/2+(i/30)*w;
y=cy-h/2;
dx=0;
dy=-1;

}else if(i<60){

x=cx+w/2;
y=cy-h/2+
((i-30)/30)*h;
dx=1;
dy=0;

}else if(i<90){

x=cx+w/2-
((i-60)/30)*w;
y=cy+h/2;
dx=0;
dy=1;

}else{

x=cx-w/2;
y=cy+h/2-
((i-90)/30)*h;
dx=-1;
dy=0;
}

sctx.beginPath();

sctx.strokeStyle="#1db954";
sctx.lineWidth=6;
sctx.lineCap="round";

sctx.moveTo(x,y);

sctx.lineTo(
x+dx*size,
y+dy*size
);

sctx.stroke();
}

/* 封面震動 */

let bass=
dataArray[1]+
dataArray[2]+
dataArray[3];

let scale=
1+bass/1000;

cover.style.scale=scale;
}

drawBorder();

/* 星空 */

const stars=
document.getElementById("stars");
const stx=
stars.getContext("2d");

stars.width=
innerWidth;

stars.height=
innerHeight;

const particles=[];

for(let i=0;i<120;i++){

particles.push({

x:Math.random()*stars.width,
y:Math.random()*stars.height,
r:Math.random()*2,
v:Math.random()*0.5

});

}

function animateStars(){

requestAnimationFrame(
animateStars
);

stx.fillStyle="#000";
stx.fillRect(
0,0,
stars.width,
stars.height
);

stx.fillStyle="white";

particles.forEach(p=>{

p.y+=p.v;

if(p.y>stars.height){
p.y=0;
}

stx.beginPath();

stx.arc(
p.x,
p.y,
p.r,
0,
Math.PI*2
);

stx.fill();

});

}

animateStars();

</script>

</body>
</html>
