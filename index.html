<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taurus Music Player</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.player{
    width:350px;
    background:#111;
    border-radius:20px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(255,255,255,.15);
}

.cover{
    width:250px;
    height:250px;
    object-fit:cover;
    border-radius:15px;
}

h2{
    margin-top:15px;
}

button{
    margin-top:15px;
    padding:10px 25px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
}

input[type=range]{
    width:100%;
}
</style>
</head>
<body>

<div class="player">

<img src="cover.png" class="cover">

<h2>Taurus Music</h2>

<audio id="audio" src="music.mp3"></audio>

<button id="playBtn">▶ Play</button>

<br><br>

<input type="range" id="progress" value="0">

<br><br>

Volume

<input type="range" id="volume"
min="0"
max="1"
step="0.01"
value="1">

</div>

<script>

const audio=document.getElementById("audio");
const playBtn=document.getElementById("playBtn");
const progress=document.getElementById("progress");
const volume=document.getElementById("volume");

playBtn.onclick=()=>{

if(audio.paused){
audio.play();
playBtn.textContent="⏸ Pause";
}else{
audio.pause();
playBtn.textContent="▶ Play";
}

};

audio.addEventListener("timeupdate",()=>{

progress.value=
(audio.currentTime/audio.duration)*100||0;

});

progress.addEventListener("input",()=>{

audio.currentTime=
(progress.value/100)*audio.duration;

});

volume.addEventListener("input",()=>{

audio.volume=volume.value;

});

</script>

</body>
</html>
